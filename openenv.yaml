name: "openenv-customer-support"
description: "A heavily robust RL environment simulating a customer support agent workflow. Models must converse, diagnose, and conditionally escalate or resolve complex technical and billing issues using strict JSON logic. Includes 3 tasks of increasing difficulty."

observation_schema:
  type: "object"
  properties:
    ticket:
      type: "string"
    customer_profile:
      type: "string"
    policy_snippets:
      type: "string"
    conversation_history:
      type: "array"
      items:
        type: "string"
    last_tool_output:
      type: "string"
    remaining_steps:
      type: "integer"

action_schema:
  type: "object"
  properties:
    action_type:
      type: "string"
      enum: ["reply", "ask_user", "use_tool", "close_ticket", "escalate"]
    payload:
      type: "object"

reward_spec: "Dense trajectory matching logic assigning partial rewards for sub-commands and heavy positive/negative resolution tracking bounded to [0,1]."
